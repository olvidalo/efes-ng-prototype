name: Release GUI

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build library packages
        run: npm run build

      - name: Build Electron app
        run: npm -w @efes-ng/gui run build:${{ matrix.platform }} -- --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: efes-ng-${{ matrix.platform }}
          path: |
            packages/gui/dist/*.dmg
            packages/gui/dist/*.zip
            packages/gui/dist/*.exe
            packages/gui/dist/*.AppImage
            packages/gui/dist/*.deb
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/efes-ng-mac/*
            artifacts/efes-ng-win/*
            artifacts/efes-ng-linux/*
