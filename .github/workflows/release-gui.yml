name: Release GUI

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (M-series): macos-latest is arm64 since 2024.
          - os: macos-latest
            platform: mac
            artifact: mac-arm64
          # Intel: macos-13 is the last x64 image GitHub provides.
          - os: macos-13
            platform: mac
            artifact: mac-x64
          - os: windows-latest
            platform: win
            artifact: win
          - os: ubuntu-latest
            platform: linux
            artifact: linux

    runs-on: ${{ matrix.os }}

    # Redirect Electron and electron-builder downloads to a known cacheable
    # path that is identical on all three runners.
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Cache Electron and electron-builder downloads
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/electron
            ${{ github.workspace }}/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('packages/gui/package.json', 'packages/gui/electron-builder.yml') }}
          restore-keys: |
            electron-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Build library packages
        run: npm run build

      - name: Build Electron app
        run: npm -w @efes-ng/gui run build:${{ matrix.platform }} -- --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: efes-ng-${{ matrix.artifact }}
          path: |
            packages/gui/dist/*.dmg
            packages/gui/dist/*.zip
            packages/gui/dist/*.exe
            packages/gui/dist/*.AppImage
            packages/gui/dist/*.deb
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/efes-ng-mac-arm64/*
            artifacts/efes-ng-mac-x64/*
            artifacts/efes-ng-win/*
            artifacts/efes-ng-linux/*
