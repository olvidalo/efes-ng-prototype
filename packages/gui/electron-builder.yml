appId: com.efes-ng.app
productName: EFES-NG Prototype
directories:
  buildResources: build
# Core library: only ship dist/ (electron-builder follows workspace symlinks,
# ignoring package.json "files" field, so we filter explicitly)
files:
  - from: .
    filter:
      - "**/*"
      - "!node_modules/@efes-ng/core/**"
      - node_modules/@efes-ng/core/dist/**
      - node_modules/@efes-ng/core/package.json
asarUnpack:
  - resources/**
  # Worker threads and child processes need real file paths, not asar
  - node_modules/@efes-ng/core/**
  - node_modules/saxonjs-he/**
  - node_modules/xslt3-he/**
  # Native modules
  - node_modules/fsevents/**
  - node_modules/esbuild/**
  - node_modules/@esbuild/**
win:
  executableName: efes-ng
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  identity: null
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${productName}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: efes-ng
  category: Utility
appImage:
  artifactName: ${productName}-${version}.${ext}
electronVersion: "40.8.3"
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
