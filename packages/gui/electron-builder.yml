appId: com.efes-ng.app
productName: EFES-NG Prototype
directories:
  buildResources: build
# Core library: only ship dist/ (electron-builder follows workspace symlinks,
# ignoring package.json "files" field, so we filter explicitly)
files:
  - from: .
    filter:
      - "**/*"
      - "!node_modules/@efes-ng/core/**"
      - node_modules/@efes-ng/core/dist/**
      - node_modules/@efes-ng/core/package.json
asar: true
asarUnpack:
  # Worker threads and forked child processes (ELECTRON_RUN_AS_NODE) cannot
  # read from asar archives. Unpack all node_modules so workers and the
  # Eleventy runner can resolve their dependencies.
  - resources/**
  - node_modules/**
win:
  executableName: efes-ng
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
mac:
  identity: null
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${productName}-${version}.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: efes-ng
  category: Utility
  artifactName: ${productName}-${version}.${ext}
appImage:
  artifactName: ${productName}-${version}.${ext}
deb:
  artifactName: ${productName}-${version}.${ext}
electronVersion: "40.8.3"
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
