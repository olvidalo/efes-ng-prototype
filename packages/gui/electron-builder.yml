appId: com.efes-ng.app
productName: EFES-NG Prototype
directories:
  buildResources: build
# Core library: only ship dist/ (electron-builder follows workspace symlinks,
# ignoring package.json "files" field, so we filter explicitly)
files:
  - from: .
    filter:
      - "**/*"
      - "!node_modules/@efes-ng/core/**"
      - node_modules/@efes-ng/core/dist/**
      - node_modules/@efes-ng/core/package.json
asar: true
asarUnpack:
  # Worker threads and forked child processes (ELECTRON_RUN_AS_NODE) cannot
  # read from asar archives. Unpack all node_modules so workers and the
  # Eleventy runner can resolve their dependencies.
  - resources/**
  - node_modules/**
win:
  executableName: efes-ng
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
mac:
  # Ad-hoc signing: no Apple cert required, and `codesign` is built into
  # macOS so any mac contributor can build without extra setup. Apple Silicon
  # refuses to launch unsigned apps; ad-hoc satisfies that requirement.
  # Gatekeeper still warns on first launch (right-click > Open to dismiss).
  # For a real Developer ID signed build, replace `identity` with
  # "Developer ID Application: <Name> (<TEAMID>)" and set CSC_LINK +
  # CSC_KEY_PASSWORD env vars (paid Apple Developer Program account required).
  identity: '-'
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${productName}-${version}.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: efes-ng
  category: Utility
  artifactName: ${productName}-${version}.${ext}
appImage:
  artifactName: ${productName}-${version}.${ext}
deb:
  artifactName: ${productName}-${version}.${ext}
electronVersion: "40.8.3"
npmRebuild: false
# Auto-updates are not configured. To enable, replace this block with a
# real provider (e.g. provider: github) and remove `--publish never`
# from the release-gui workflow.
# publish:
#   provider: generic
#   url: https://example.com/auto-updates
