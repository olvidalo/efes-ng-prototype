appId: com.efes-ng.app
productName: EFES-NG
directories:
  buildResources: build
files:
  # Default: include out/, package.json, node_modules (automatic)
  # Core library: only ship the built dist/
  - from: .
    filter:
      - "**/*"
      - "!node_modules/efes-ng-phase-2-poc/**"
      - node_modules/efes-ng-phase-2-poc/dist/**
      - node_modules/efes-ng-phase-2-poc/package.json
asarUnpack:
  - resources/**
  # Worker threads and child processes need real file paths, not asar
  - node_modules/efes-ng-phase-2-poc/**
  - node_modules/saxonjs-he/**
  - node_modules/xslt3-he/**
  # Native modules
  - node_modules/fsevents/**
  - node_modules/esbuild/**
  - node_modules/@esbuild/**
win:
  executableName: efes-ng
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  identity: null
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: efes-ng
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://example.com/auto-updates
